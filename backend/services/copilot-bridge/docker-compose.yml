services:
  copilot-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apo-copilot-bridge
    ports:
      - "${COPILOT_BRIDGE_PORT:-4005}:${COPILOT_BRIDGE_PORT:-4005}"
    volumes:
      - .:/app
    environment:
      TELEMETRY_ANALYTICS_URL: "http://apo-telemetry-analytics:4003"
      PORT: "${COPILOT_BRIDGE_PORT:-4005}"
      MOCK_REASONING: "false"
      NODE_ENV: "development"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy:4317"
      SERVICE_NAME: "copilot-bridge"
      COPILOT_AGENT_PROVIDER: "${COPILOT_AGENT_PROVIDER:-ollama}"
      COPILOT_AGENT_MODEL: "${COPILOT_AGENT_MODEL:-qwen2.5:3b}"
      MASTRA_AI_URL: "http://apo-mastra-ai:4006"
    depends_on:
      - apo-telemetry-analytics
      - apo-mastra-ai
